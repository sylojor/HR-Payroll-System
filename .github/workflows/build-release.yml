name: Build & Release Attindo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_ENV: development

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: "file:./db/attindo.db"

      - name: Copy standalone files & merge node_modules
        run: node scripts/copy-standalone.js

      - name: Verify standalone build
        shell: pwsh
        run: |
          Write-Host "=== Verifying standalone build ==="

          $standaloneDir = ".next\standalone"
          $nextNm = "$standaloneDir\.next\node_modules"

          # Check .next/node_modules (this is where ALL modules should be after merge)
          if (Test-Path $nextNm) {
            $entries = Get-ChildItem $nextNm -Directory
            Write-Host "✅ .next/node_modules has $($entries.Count) packages"
            
            # List all packages for debugging
            $entries | ForEach-Object { Write-Host "  - $($_.Name)" }
          } else {
            Write-Host "❌ .next/node_modules DOES NOT EXIST!"
          }

          # Check for critical modules in .next/node_modules
          $criticalModules = @('next', 'react', 'react-dom', '@prisma', 'styled-jsx')
          foreach ($mod in $criticalModules) {
            $modPath = Join-Path $nextNm $mod
            if (Test-Path $modPath) {
              Write-Host "✅ $mod found in .next/node_modules"
            } else {
              Write-Host "❌ $mod NOT found in .next/node_modules"
            }
          }

          # Check that next/dist/server exists
          $nextServerDir = Join-Path $nextNm "next\dist\server"
          if (Test-Path $nextServerDir) {
            Write-Host "✅ next/dist/server exists"
          } else {
            Write-Host "❌ next/dist/server MISSING"
          }

          # Check for root node_modules (should NOT exist after merge)
          $rootNm = "$standaloneDir\node_modules"
          if (Test-Path $rootNm) {
            Write-Host "⚠️ Root node_modules still exists (will be pruned by electron-builder)"
          } else {
            Write-Host "✅ Root node_modules removed (all modules in .next/node_modules)"
          }

          # Report standalone size
          $standaloneSize = (Get-ChildItem $standaloneDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "📦 Standalone size: $([math]::Round($standaloneSize, 2)) MB"

      - name: Copy Node.js binary for bundling
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source
          Write-Host "Node.js binary: $nodePath"
          $nodeVersion = node --version
          Write-Host "Node.js version: $nodeVersion"

          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item $nodePath "build\node.exe" -Force

          $fileSize = (Get-Item "build\node.exe").Length / 1MB
          Write-Host "✅ Node.js binary copied ($([math]::Round($fileSize, 2)) MB)"

      - name: Build Electron App (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List release files
        shell: pwsh
        run: |
          if (Test-Path "release") {
            Get-ChildItem "release" -Recurse -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - ${sizeMB}MB"
            }
          } else {
            Write-Host "No release directory found"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Attindo v${{ steps.version.outputs.VERSION }}"
          body: |
            # 🏢 Attindo HR & Payroll System v${{ steps.version.outputs.VERSION }}

            ## 📥 Download
            Download **Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe** to install Attindo on your Windows computer.

            ## ✨ Features
            - 🧑‍💼 Employee Management
            - 🏢 Department & Position Management
            - 👆 ZK Fingerprint Device Support (3 devices free)
            - ⏰ Attendance Tracking
            - 🏖️ Leave Management
            - 💰 Payroll Processing
            - 🔐 License Management
            - ⚙️ Settings & Configuration

            ## 📋 System Requirements
            - Windows 10 or later (64-bit)
            - 4 GB RAM minimum
            - 300 MB disk space

            ## 🚀 Installation
            1. Download `Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe`
            2. Run the installer
            3. Follow the setup wizard
            4. Launch Attindo from your desktop

            ## 🔑 Default Login
            - Username: `admin`
            - Password: `admin123`

            ## 📜 License Keys (Testing)
            - HR Module: `ATT-HR-2025-PRO-001`
            - Payroll Module: `ATT-PAY-2025-PRO-001`
            - Fingerprint Pro: `ATT-FP-2025-PRO-010`

            ---
            *Built with ❤️ by Attindo Team*
          draft: false
          prerelease: false
          files: |
            release/Attindo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

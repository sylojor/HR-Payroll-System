name: Build & Release Attindo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          # Use npm for reliable node_modules structure (Bun's symlink-based structure
          # can cause issues with Next.js standalone build module tracing)
          npm install --legacy-peer-deps
        env:
          NODE_ENV: development

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: "file:./db/attindo.db"

      - name: Copy standalone files
        run: node scripts/copy-standalone.js

      - name: Verify standalone build has node_modules
        shell: pwsh
        run: |
          Write-Host "=== Verifying standalone build ==="

          $standaloneDir = ".next\standalone"
          $nodeModulesDir = "$standaloneDir\node_modules"
          $nextModuleDir = "$nodeModulesDir\next"

          if (Test-Path $nextModuleDir) {
            Write-Host "✅ next module found in standalone"
            $nextPkg = Get-Content "$nextModuleDir\package.json" | ConvertFrom-Json
            Write-Host "   Version: $($nextPkg.version)"
          } else {
            Write-Host "❌ next module NOT found in standalone!"
            Write-Host "   Attempting to copy from project node_modules..."
            Copy-Item -Path "node_modules\next" -Destination $nextModuleDir -Recurse -Force -ErrorAction SilentlyContinue
            if (Test-Path $nextModuleDir) {
              Write-Host "✅ next module copied successfully"
            } else {
              Write-Host "❌ Failed to copy next module - build may be broken!"
            }
          }

          # Also check for next/dist/server
          $nextServerDir = "$nextModuleDir\dist\server"
          if (Test-Path $nextServerDir) {
            Write-Host "✅ next/dist/server exists"
          } else {
            Write-Host "❌ next/dist/server MISSING"
          }

          # Check node_modules count
          if (Test-Path $nodeModulesDir) {
            $count = (Get-ChildItem $nodeModulesDir -Directory).Count
            Write-Host "📦 standalone/node_modules has $count packages"
          } else {
            Write-Host "❌ standalone/node_modules DOES NOT EXIST!"
          }

      - name: Copy Node.js binary for bundling
        shell: pwsh
        run: |
          # Get the Node.js binary path from the runner
          $nodePath = (Get-Command node).Source
          Write-Host "Node.js binary: $nodePath"
          $nodeVersion = node --version
          Write-Host "Node.js version: $nodeVersion"

          # Create build directory and copy node.exe
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item $nodePath "build\node.exe" -Force

          $fileSize = (Get-Item "build\node.exe").Length / 1MB
          Write-Host "✅ Node.js binary copied to build/node.exe ($([math]::Round($fileSize, 2)) MB)"

      - name: Diagnostic - List build output
        shell: pwsh
        run: |
          Write-Host "=== .next directory ==="
          if (Test-Path ".next") {
            Get-ChildItem ".next" -Depth 0 | ForEach-Object { Write-Host "  $($_.Name) [$($_.GetType().Name)]" }
          } else {
            Write-Host ".next NOT found"
          }
          Write-Host ""
          Write-Host "=== .next/standalone directory ==="
          if (Test-Path ".next\standalone") {
            Get-ChildItem ".next\standalone" -Depth 0 | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Host ".next/standalone NOT found"
          }
          Write-Host ""
          Write-Host "=== .next/standalone/.next ==="
          if (Test-Path ".next\standalone\.next") {
            Get-ChildItem ".next\standalone\.next" -Depth 0 | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Host ".next/standalone/.next NOT found"
          }
          Write-Host ""
          Write-Host "=== Build resources ==="
          if (Test-Path "build\icon.ico") { Write-Host "  ✅ icon.ico" } else { Write-Host "  ❌ icon.ico MISSING" }
          if (Test-Path "build\node.exe") { Write-Host "  ✅ node.exe" } else { Write-Host "  ❌ node.exe MISSING" }
          if (Test-Path "electron\main.js") { Write-Host "  ✅ electron/main.js" } else { Write-Host "  ❌ electron/main.js MISSING" }
          if (Test-Path "electron\preload.js") { Write-Host "  ✅ electron/preload.js" } else { Write-Host "  ❌ electron/preload.js MISSING" }
          if (Test-Path ".next\standalone\server.js") { Write-Host "  ✅ standalone/server.js" } else { Write-Host "  ❌ standalone/server.js MISSING" }
          if (Test-Path ".next\standalone\node_modules\next") { Write-Host "  ✅ standalone/node_modules/next" } else { Write-Host "  ❌ standalone/node_modules/next MISSING" }

      - name: Build Electron App (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List release files
        shell: pwsh
        run: |
          if (Test-Path "release") {
            Get-ChildItem "release" -Recurse -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - ${sizeMB}MB"
            }
          } else {
            Write-Host "No release directory found"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Attindo v${{ steps.version.outputs.VERSION }}"
          body: |
            # 🏢 Attindo HR & Payroll System v${{ steps.version.outputs.VERSION }}

            ## 📥 Download
            Download **Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe** to install Attindo on your Windows computer.

            ## ✨ Features
            - 🧑‍💼 Employee Management
            - 🏢 Department & Position Management
            - 👆 ZK Fingerprint Device Support (3 devices free)
            - ⏰ Attendance Tracking
            - 🏖️ Leave Management
            - 💰 Payroll Processing
            - 🔐 License Management
            - ⚙️ Settings & Configuration

            ## 📋 System Requirements
            - Windows 10 or later (64-bit)
            - 4 GB RAM minimum
            - 500 MB disk space

            ## 🚀 Installation
            1. Download `Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe`
            2. Run the installer
            3. Follow the setup wizard
            4. Launch Attindo from your desktop

            ## 🔑 Default Login
            - Username: `admin`
            - Password: `admin123`

            ## 📜 License Keys (Testing)
            - HR Module: `ATT-HR-2025-PRO-001`
            - Payroll Module: `ATT-PAY-2025-PRO-001`
            - Fingerprint Pro: `ATT-FP-2025-PRO-010`

            ---
            *Built with ❤️ by Attindo Team*
          draft: false
          prerelease: false
          files: |
            release/Attindo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

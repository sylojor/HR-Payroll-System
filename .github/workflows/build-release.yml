name: Build & Release Attindo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.7.0)'
        required: true
        default: '1.8.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_ENV: development

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: "file:./db/template.db"

      - name: Create template database
        shell: pwsh
        run: |
          Write-Host "=== Creating template database ==="

          # Create a fresh SQLite database with all tables using prisma db push
          # This template will be bundled with the app and copied on first launch
          $env:DATABASE_URL = "file:./build/template.db"

          # Ensure build directory exists
          New-Item -ItemType Directory -Force -Path "build" | Out-Null

          # Run prisma db push to create the template database with all tables
          npx prisma db push --skip-generate --accept-data-loss

          if (Test-Path "build/template.db") {
            $size = (Get-Item "build/template.db").Length
            Write-Host "✅ Template database created ($size bytes)"

            # Verify the template has tables by checking file size
            if ($size -gt 1000) {
              Write-Host "✅ Template database appears valid (>1KB)"
            } else {
              Write-Host "⚠️ Template database is suspiciously small, might be empty"
            }
          } else {
            Write-Host "❌ Template database was NOT created!"
            Write-Host "Attempting alternative approach..."

            # Alternative: use the db from the build process
            if (Test-Path "db/template.db") {
              Copy-Item "db/template.db" "build/template.db" -Force
              Write-Host "✅ Copied template from db directory"
            } else {
              Write-Host "❌ No template database available. Build may fail on first launch."
            }
          }

      - name: Copy standalone files & merge node_modules
        run: node scripts/copy-standalone.js

      - name: Verify standalone build
        shell: pwsh
        run: |
          Write-Host "=== Verifying standalone build ==="

          $standaloneDir = ".next\standalone"
          $nextNm = "$standaloneDir\.next\node_modules"

          # Check .next/node_modules
          if (Test-Path $nextNm) {
            $entries = Get-ChildItem $nextNm -Directory
            Write-Host "✅ .next/node_modules has $($entries.Count) packages"
          } else {
            Write-Host "❌ .next/node_modules DOES NOT EXIST!"
          }

          # Check for critical modules
          $criticalModules = @('next', 'react', 'react-dom', '@prisma', 'styled-jsx', 'prisma')
          foreach ($mod in $criticalModules) {
            $modPath = Join-Path $nextNm $mod
            if (Test-Path $modPath) {
              Write-Host "✅ $mod found"
            } else {
              Write-Host "❌ $mod NOT found"
            }
          }

          # Check prisma CLI
          $prismaBuild = Join-Path $nextNm "prisma\build\index.js"
          if (Test-Path $prismaBuild) {
            Write-Host "✅ prisma CLI found"
          } else {
            Write-Host "❌ prisma CLI NOT found"
          }

          # Check template database
          if (Test-Path "build\template.db") {
            $size = (Get-Item "build\template.db").Length
            Write-Host "✅ Template database exists ($size bytes)"
          } else {
            Write-Host "❌ Template database NOT found!"
          }

          # Check that .env is NOT in standalone (we don't want it overriding DATABASE_URL)
          if (Test-Path "$standaloneDir\.env") {
            Write-Host "⚠️ .env file found in standalone - removing to avoid DATABASE_URL conflict"
            Remove-Item "$standaloneDir\.env" -Force
          } else {
            Write-Host "✅ No .env file in standalone (correct)"
          }

          # Report standalone size
          $standaloneSize = (Get-ChildItem $standaloneDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "📦 Standalone size: $([math]::Round($standaloneSize, 2)) MB"

      - name: Copy Node.js binary for bundling
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source
          Write-Host "Node.js binary: $nodePath"
          $nodeVersion = node --version
          Write-Host "Node.js version: $nodeVersion"

          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item $nodePath "build\node.exe" -Force

          $fileSize = (Get-Item "build\node.exe").Length / 1MB
          Write-Host "✅ Node.js binary copied ($([math]::Round($fileSize, 2)) MB)"

          # Verify template.db is still there
          if (Test-Path "build\template.db") {
            Write-Host "✅ Template database still in build directory"
          } else {
            Write-Host "❌ Template database missing from build directory!"
          }

      - name: Build Electron App (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List release files
        shell: pwsh
        run: |
          if (Test-Path "release") {
            Get-ChildItem "release" -Recurse -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - ${sizeMB}MB"
            }
          } else {
            Write-Host "No release directory found"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Attindo v${{ steps.version.outputs.VERSION }}"
          body: |
            # 🏢 Attindo HR & Payroll System v${{ steps.version.outputs.VERSION }}

            ## 📥 Download
            Download **Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe** to install Attindo on your Windows computer.

            ## ✨ Features
            - 🧑‍💼 Employee Management
            - 🏢 Department & Position Management
            - 👆 ZK Fingerprint Device Support (3 devices free)
            - ⏰ Attendance Tracking
            - 🏖️ Leave Management
            - 💰 Payroll Processing
            - 🔐 License Management
            - 💾 Backup & Restore
            - ⚙️ Settings & Configuration
            - 🌐 Bilingual (English/Arabic)

            ## 📋 System Requirements
            - Windows 10 or later (64-bit)
            - 4 GB RAM minimum
            - 300 MB disk space

            ## 🚀 Installation
            1. Download `Attindo-Setup-${{ steps.version.outputs.VERSION }}.exe`
            2. Run the installer
            3. Launch Attindo from your desktop
            4. Login with default credentials

            ## 🔑 Default Login (Auto-Created)
            - Username: `admin`
            - Password: `admin123`

            > ⚠️ **Please change the default password after first login** from Settings → Security

            ## 🔑 License Keys (Testing)
            - HR Module: `ATT-HR-2025-PRO-001`
            - Payroll Module: `ATT-PAY-2025-PRO-001`
            - Fingerprint Pro: `ATT-FP-2025-PRO-010`

            ## 🆕 What's New in v1.8.0
            - ✅ Fixed 503 error on /api/setup when database tables don't exist
            - ✅ Added /api/db-init endpoint for manual/auto database initialization
            - ✅ Auto-initialization of database schema when tables are missing
            - ✅ New "Database Setup Required" screen with one-click initialization
            - ✅ Option to initialize with default admin (admin/admin123) or use setup wizard
            - ✅ All API endpoints auto-detect and handle missing database tables
            - ✅ Removed database files from git (auto-created on first run)
            - ✅ Switched to async exec to prevent server hanging during DB init
            - ✅ Improved error messages directing users to initialization options

            ---
            *Built with ❤️ by Attindo Team*
          draft: false
          prerelease: false
          files: |
            release/Attindo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
